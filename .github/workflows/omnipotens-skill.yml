name: Validate Omnipotents skill

on:
  pull_request:
    paths:
      - '.claude/skills/omnipotens/**'
      - 'scripts/**'
      - 'tools/**'
      - '.github/workflows/omnipotens-skill.yml'
      - 'README.md'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Test deterministic report packager
        run: node .claude/skills/omnipotens/scripts/test.mjs

      - name: Test Vitia source validation
        run: node .claude/skills/omnipotens/scripts/test-vitia-source.mjs

      - name: Test untrusted input boundary
        run: node .claude/skills/omnipotens/scripts/test-input-gate.mjs

      - name: Test repository integrity verification
        shell: pwsh
        run: ./scripts/tests/Test-OmnipotensRepository.Tests.ps1

      - name: Test company input preflight bridge
        shell: pwsh
        run: ./scripts/tests/Test-OmnipotensCompanyInput.Tests.ps1

      - name: Test selective service analysis catalog
        run: node .claude/skills/omnipotens/scripts/test-service-analysis.mjs

      - name: Verify repository prerequisites
        shell: pwsh
        run: ./scripts/Test-OmnipotensRepository.ps1

  planner:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Test and publish analysis planner
        shell: pwsh
        run: ./scripts/Publish-OmnipotensPlanner.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: omnipotens-analysis-planner-win-x64
          path: release/omnipotens-analysis-planner/Omnipotens.AnalysisPlanner.exe
          if-no-files-found: error
